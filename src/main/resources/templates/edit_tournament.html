<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>All People</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">

</head>
<body>
<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<div th:replace="~{nav_bar}"></div>

<h1>Players</h1>

<table class = "table table-striped">
    <tr>
        <th>Person's Name</th>
        <th>Wins</th>
        <th>loses</th>
        <th>ID</th>
        <th>Actions</th>
    </tr>
</table>

<a href="/form">Add new person</a>

<h1>Matches</h1>

<table class = "table table-striped">
    <tr>
        <th>ID</th>
        <th>Player 1</th>
        <th>Player 2</th>
        <th>Round</th>
        <th>Winner</th>
        <th>Actions</th>
    </tr>
    <tr th:each="match : ${match_list}">
        <td th:text="${match.id}"></td>
        <td th:text="${match.player1.name}"></td>
        <td th:text="${match.player2.name}"></td>
        <td th:text="${match.round}"></td>
        <td th:text="${match.winner} ?: 'N/A'"></td>
        <td>
            <a th:href="@{/delete_match/{id}(id=${match.id})}"><button>Delete</button></a>
            <a th:href="@{/edit_match/{id}(id=${match.id})}"><button>Update</button></a>
        </td>
    </tr>
</table>
</body>
</html>
