<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">

</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<table class = "table table-striped">
    <tr>
        <th>ID</th>
        <th>Player 1</th>
        <th>Player 2</th>
        <th>Round</th>
        <th>Winner</th>
        <th>Select Winner</th>
        <th>Actions</th>
    </tr>
    <tr th:each="match : ${match_link_list}">
        <td th:text="${match.id}"></td>
        <td th:text="${match.player1} ?: 'N/A'"></td>
        <td th:text="${match.player2} ?: 'N/A'"></td>
        <td th:text="${match.round}"></td>
        <td th:text="${match.winner} ?: 'N/A'"></td>
        <td>
            <a th:href="@{/delete_match/{id}(id=${match.id})}"><button class="btn btn-danger" th:text="${match.player1} ?: 'N/A'"></button></a>
            <a th:href="@{/edit_match/{id}(id=${match.id})}"><button class="btn btn-primary" th:text="${match.player2} ?: 'N/A'">Player 2</button></a>
        </td>
        <td>
            <a th:href="@{/delete_match/{id}(id=${match.id})}"><button class="btn btn-danger">Delete</button></a>
            <a th:href="@{/edit_match/{id}(id=${match.id})}"><button class="btn btn-primary">Update</button></a>
        </td>
    </tr>
</table>



</body>
</html>
