<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">
    <style>
        * {
            box-sizing: border-box;
        }

        .row {
            display: flex;
        }

        .column {
            flex: 30%;
            padding: 5px;
        }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<div class = "row">
    <div class = "column">
        <table class = "table table-bordered">
            <th>Round 1</th>
            <th>Round 2</th>
            <tr th:each="match : ${round_list.round1}">
                <td th:text="${match?.player1} + ' vs. ' + ${match?.player2} ?: 'N/A'"></td>
            </tr>
        </table>
    </div>
    <div class = "column">
        <table class = "table table-bordered">
            <th>Round 2</th>
            <tr th:each="match : ${round_list.round2}">
                <td rowspan="2" th:text="${match?.player1} + ' vs. ' + ${match?.player2} ?: 'N/A'"></td>
            </tr>
        </table>
    </div>
    <div class = "column">
        <table class = "table table-bordered">
            <th>Winner</th>
            <tr th:each="match : ${round_list.round2}">
                <td rowspan="4" th:text="${match?.winner} ?: 'N/A'"></td>
            </tr>
        </table>
     </div>
    </div>
</table>



</body>
</html>
