<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>All People</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
<h1>All People</h1>
<p th:text="'content: ' + ${people}"></p>
<p th:text="'second  list: ' + ${allPeople}"></p>
<p th:each="person : ${allPeople}"></p>

<table class = "table table-striped">
    <tr>
        <th>Person's Name</th>
        <th>Wins</th>
        <th>loses</th>
        <th>ID</th>
        <th>Actions</th>
    </tr>
    <tr th:each="person : ${allPeople}">
        <td th:text="${person.name}"></td>
        <td th:text="${person.victories}"></td>
        <td th:text="${person.loses}"></td>
        <td th:text="${person.ID}"></td>
        <td>
            <a th:href="@{/delete_person/{id}(id=${person.ID})}"><button>Delete</button></a>
            <a th:href="@{/edit_person/{id}(id=${person.ID})}" class="btn btn-primary"><buuton>Update</buuton></a>
        </td>
    </tr>
</table>
<a href="/form">Add new person</a>
</body>
</html>
