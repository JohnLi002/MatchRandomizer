<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>All People</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">

</head>
<body>
<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Bracket Creator</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" href="/form">Form</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/match">Get Match</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/all_matches">Display All Matches</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/all">Display All People</a>
            </li>
        </ul>
    </div>
</nav>

<h1>List of Tournaments</h1>

<table class = "table table-striped">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Max Number of Players</th>
        <th>Actions</th>
    </tr>
    <tr th:each="tournament : ${tournament_list}">
        <td th:text="${tournament.id}"></td>
        <td th:text="${tournament.name}"></td>
        <td th:text="${tournament.max_players}"></td>
        <td>
            <a th:href="@{/delete_tournament/{id}(id=${tournament.id})}"><button>Delete</button></a>
            <a th:href="@{/edit_tournament/{id}(id=${tournament.id})}"><button>Update</button></a>
        </td>
    </tr>
</table>
</body>
</html>
