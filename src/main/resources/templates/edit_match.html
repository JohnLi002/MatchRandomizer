<!DOCTYPE HTML>
<head>
    <title>Match Randomizer</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">
    <html xmlns:th="https://www.thymeleaf.org">
</head>
<body>
<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<div th:replace="~{nav_bar}"></div>

<div class="container">
<h1>Editing Match</h1>


<form action="#" th:action="@{/edit_match}" th:object="${MatchForm}" method="post">
    <table>
        <tr>
            <td>ID:</td>
            <td><input type="text" th:field="*{id}" readonly/></td>
        </tr>

        <tr>
            <td>Player 1:</td>
            <td><select class="form-select" th:field="*{player1_id}">
                <th:block th:each="player : ${player1_list}">
                    <option th:value="${player.ID}" th:text="${player.name}"></option>
                </th:block>
            </select> </td>
        </tr>
        <tr>
            <td>Player 2:</td>
            <td><select th:field="*{player2_id}">
                <th:block th:each="player : ${player2_list}">
                    <option th:value="${player.ID}" th:text="${player.name}"></option>
                </th:block>
            </select> </td>
        </tr>
        <tr>
            <td>Winner:</td>
            <td><select th:field="*{winner}">
                <th:block th:each="player : ${winner_list}">
                    <option th:value="${player.ID}" th:text="${player.name}"></option>
                </th:block>
            </select> </td>
        </tr>
        <tr>
            <td>Round:</td>
            <td><input type="number" th:field="*{round}"/></td>
        </tr>


        <tr>
            <td><button type="submit" class="btn btn-primary">Submit</button></td>
        </tr>
    </table>
</form>
</div>
</body>
</html>
