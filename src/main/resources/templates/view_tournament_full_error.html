<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Edit Tournament</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">

</head>
<body>
<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<div th:replace="~{fragments/nav_bar}"></div>

<h1 th:text="'Name: ' + ${tournament.name}"></h1>

<div class="alert alert-danger" role="alert">
    There are currently too many players assigned to this tournament. Please remove some or increase the max number of players to be able to add more
</div>

<table>
    <tr>
        <th><h3 th:text="'Max Players: ' + ${tournament.max_players}"></h3></th>
        <th><a th:href="@{/tournament/{id}/edit/max(id=${tournament_id})}"><button class="btn btn-primary">Change</button></a></th>
    </tr>
</table>


<h1>Players</h1>

<table class = "table table-striped">
    <tr>
        <th>Person's Name</th>
        <th>Wins</th>
        <th>loses</th>
        <th>ID</th>
        <th>Actions</th>
    </tr>
    <tr th:each="person : ${people_list}">
        <td th:text="${person.name}"></td>
        <td th:text="${person.victories}"></td>
        <td th:text="${person.loses}"></td>
        <td th:text="${person.ID}"></td>
        <td>
            <a th:href="@{/tournament/{tournament_id}/player/{player_id}/remove(tournament_id=${tournament_id}, player_id=${person.ID})}"><button class="btn btn-danger">Remove</button></a>
            <a th:href="@{/tournament/{tournament_id}/player/{player_id}/edit(tournament_id=${tournament_id}, player_id=${person.ID})}"><button class="btn btn-primary">Update</button></a>
        </td>

</table>

<a th:href="@{/tournament/{id}/edit/add/player(id=${tournament_id})}">Add new person</a>

<h1>Matches</h1>

<table class = "table table-striped">
    <tr>
        <th>ID</th>
        <th>Player 1</th>
        <th>Player 2</th>
        <th>Round</th>
        <th>Winner</th>
        <th>Actions</th>
    </tr>
    <tr th:each="match : ${match_list}">
        <td th:text="${match.id}"></td>
        <td th:text="${match.player1.name}"></td>
        <td th:text="${match.player2.name}"></td>
        <td th:text="${match.round}"></td>
        <td th:text="${match.winner} ?: 'N/A'"></td>
        <td>
            <a th:href="@{/delete_match/{id}(id=${match.id})}"><button class="btn btn-danger">Delete</button></a>
            <a th:href="@{/edit_match/{id}(id=${match.id})}"><button class="btn btn-primary">Update</button></a>
        </td>
    </tr>
</table>
<a th:href="@{/}"><button class="btn btn-primary">Start Round</button></a>
</body>
</html>
