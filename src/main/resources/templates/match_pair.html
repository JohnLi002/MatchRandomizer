<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Getting Started: Handling Form Submission</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
          crossorigin="anonymous">

</head>
<body>
<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>

<div th:replace="~{nav_bar}"></div>

<h1>Result</h1>
<form action="#" th:action="@{/match}" th:object="${Victor}" method="post">
<table>
    <tr>
        <td><p th:text="'content: ' + ${Opponent1.name} + ' vs ' + ${Opponent2.name}"></p></td>
    </tr>
    <tr>
        <td>
        <label for="Winner">Winner:</label>
        </td>
        <td>
            <select id="Winner" th:field="*{winner}">
                <option th:value="${Opponent1.ID}" th:label="${Opponent1.name}"></option>
                <option th:value="${Opponent2.ID}" th:label="${Opponent2.name}"></option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Round:</td>
        <td><input type="number" th:field="*{round}"/></td>
    <tr>
        <td><button type="submit">Submit</button></td>
    </tr>
</table>
</form>
<a href="/form">Submit another message</a>
</body>
</html>
